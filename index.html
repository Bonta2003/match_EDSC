<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python subtil — Data Science</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:680px;margin:0 auto}
.hdr{margin-bottom:1.4rem}
.hdr h1{font-size:22px;font-weight:500;color:#1a1a18}
.hdr p{font-size:13px;color:#666;margin-top:4px}
.pb-bg{background:#e8e6df;border-radius:4px;height:6px;margin:.9rem 0 .4rem}
.pb-fill{height:6px;border-radius:4px;background:#534AB7;transition:width .4s}
.prog{font-size:12px;color:#888;margin-bottom:1rem}
.stats{display:flex;gap:10px;margin-bottom:1.3rem}
.sc{flex:1;background:#fff;border-radius:8px;padding:.7rem 1rem;border:.5px solid #e0ded6}
.sc-l{font-size:11px;color:#888;margin-bottom:3px}
.sc-v{font-size:20px;font-weight:500;color:#1a1a18}
.sc-v.ok{color:#0F6E56}.sc-v.ko{color:#A32D2D}
.qcard{background:#fff;border:.5px solid #ddd;border-radius:12px;padding:1.2rem;margin-bottom:.9rem}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:.7rem}
.qnum{font-size:12px;color:#888}
.qbadge{font-size:11px;padding:2px 8px;border-radius:6px;background:#e8f0fb;color:#185FA5}
.qtext{font-size:14px;color:#1a1a18;line-height:1.6;margin-bottom:.9rem;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;white-space:pre-wrap;background:#f8f7f3;padding:.7rem .9rem;border-radius:6px;border:.5px solid #e5e3db}
.qtext.plain{font-family:inherit;background:transparent;padding:0;border:none;font-size:15px;white-space:normal}
.opts{display:flex;flex-direction:column;gap:8px}
.obtn{text-align:left;padding:10px 14px;border-radius:8px;border:.5px solid #d0cec6;background:#fff;color:#1a1a18;font-size:14px;cursor:pointer;font-family:inherit;line-height:1.45;transition:background .12s,border-color .12s}
.obtn:hover:not(:disabled){background:#f5f4f0;border-color:#aaa}
.obtn.s-ok{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:500}
.obtn.s-ko{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.obtn.rev-ok{background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.obtn:disabled{cursor:default}
.fb{margin-top:10px;font-size:13px;padding:9px 13px;border-radius:8px;line-height:1.55}
.fb.ok{background:#EAF3DE;color:#27500A;border:.5px solid #3B6D11}
.fb.ko{background:#FCEBEB;color:#791F1F;border:.5px solid #A32D2D}
.nav{display:flex;gap:9px;align-items:center;margin-top:1rem;flex-wrap:wrap}
.nbtn{padding:8px 18px;border-radius:8px;border:.5px solid #ccc;background:#fff;color:#1a1a18;font-size:14px;cursor:pointer;font-family:inherit}
.nbtn:hover{background:#f0efe9}
.nbtn.pri{background:#534AB7;color:#fff;border-color:#534AB7}
.nbtn.pri:hover{background:#3C3489}
.nbtn:disabled{opacity:.35;cursor:default}
.jinp{width:64px;border:.5px solid #ccc;border-radius:8px;padding:7px 10px;font-size:14px;text-align:center}
.res{text-align:center;padding:2rem 1rem;background:#fff;border-radius:12px;border:.5px solid #ddd}
.res h2{font-size:20px;font-weight:500;margin-bottom:.4rem}
.sbig{font-size:50px;font-weight:500;margin:.8rem 0;color:#534AB7}
.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:1.3rem;justify-content:center}
.tag{font-size:12px;padding:4px 12px;border-radius:6px;border:.5px solid #ddd;background:#f5f4f0;color:#555}
.footer{text-align:center;margin-top:2rem;font-size:12px;color:#aaa}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Python subtil — Data Science</h1>
    <p>20 questions · comportements subtils &amp; pièges courants · niveau intermédiaire</p>
  </div>
  <div class="pb-bg"><div class="pb-fill" id="pb" style="width:0%"></div></div>
  <div class="prog" id="prog">Question 1 / 20</div>
  <div class="stats">
    <div class="sc"><div class="sc-l">Répondues</div><div class="sc-v" id="sa">0</div></div>
    <div class="sc"><div class="sc-l">Correctes</div><div class="sc-v ok" id="sc2">0</div></div>
    <div class="sc"><div class="sc-l">Erreurs</div><div class="sc-v ko" id="sw">0</div></div>
    <div class="sc"><div class="sc-l">Score</div><div class="sc-v" id="ss">—</div></div>
  </div>
  <div id="qa"></div>
  <div id="ra"></div>
  <div class="footer">Quiz Python Data Science · Partagez ce fichier pour que vos amis s'entraînent !</div>
</div>

<script>
const raw = [
  {t:"Listes",q:"Que vaut b après ce code ?\na = [1, 2, 3]\nb = a\nb.append(4)",opts:["[1,2,3,4]","[1,2,3]","[1,2,3,4] et a reste [1,2,3]","Erreur : b n'est pas une liste"],ans:"[1,2,3,4]",exp:"b = a ne copie pas la liste — b et a pointent vers le même objet en mémoire. Modifier b modifie aussi a."},
  {t:"Listes",q:"Quelle ligne crée une vraie copie indépendante de la liste a ?",opts:["b = a[:]","b = a","b = a + []","b = a * 1"],ans:"b = a[:]",exp:"a[:], list(a) et a.copy() créent une copie superficielle (shallow copy). Mais b = a ne copie pas — c'est juste un alias."},
  {t:"Listes",q:"Que retourne [] == [] ?",opts:["True","False","None","Erreur"],ans:"True",exp:"== compare les valeurs. Deux listes vides ont les mêmes valeurs → True. (is retournerait False car ce sont deux objets différents en mémoire.)"},
  {t:"Listes",q:"Soit l = [1,2,3,4,5]. Que vaut l[1:4:2] ?",opts:["[2, 4]","[2, 3, 4]","[1, 3, 5]","[2, 3]"],ans:"[2, 4]",exp:"Slice [start:stop:step] : début index 1 (valeur 2), fin index 4 exclu, pas 2. On prend index 1→valeur 2, puis index 3→valeur 4."},
  {t:"Listes",q:"Quelle est la complexité temporelle de 'x in liste' pour une liste de taille n ?",opts:["O(n)","O(1)","O(log n)","O(n²)"],ans:"O(n)",exp:"Les listes Python sont non triées. La recherche parcourt jusqu'à n éléments → O(n). Utilisez un set ou dict pour O(1) en moyenne."},
  {t:"Listes",q:"Que vaut [0]*3 == [0,0,0] ?",opts:["True","False","Erreur","None"],ans:"True",exp:"[0]*3 crée [0,0,0]. L'égalité == compare élément par élément → True. Attention : [[]]*3 crée 3 références vers la MÊME liste interne !"},
  {t:"Dicts",q:"Que se passe-t-il si on accède à une clé inexistante avec d['clé'] ?",opts:["KeyError","None","0","False"],ans:"KeyError",exp:"L'accès direct avec [] lève une KeyError si la clé est absente. Utilisez d.get('clé') pour None, ou d.get('clé', défaut) pour une valeur par défaut."},
  {t:"Dicts",q:"Que retourne d.get('x', 42) si 'x' n'est pas dans d ?",opts:["42","None","KeyError","0"],ans:"42",exp:"get(clé, défaut) retourne la valeur si la clé existe, sinon retourne le défaut fourni — ici 42. Sans défaut, get() retourne None."},
  {t:"Dicts",q:"d = {'a':1}; d2 = {'b':2}; d | d2 retourne :",opts:["{'a':1,'b':2}","Erreur en Python < 3.9","{'a':1}","[{'a':1},{'b':2}]"],ans:"{'a':1,'b':2}",exp:"L'opérateur | pour fusionner des dicts est disponible depuis Python 3.9. Il retourne un nouveau dict. |= fusionne en place."},
  {t:"Dicts",q:"Quelle structure utiliser pour compter les occurrences de mots dans une liste ?",opts:["collections.Counter","defaultdict(list)","OrderedDict","set"],ans:"collections.Counter",exp:"Counter(liste) crée un dict {élément: nb_occurrences} en une ligne. most_common(n) donne les n plus fréquents. Très utile en NLP et analyse de données."},
  {t:"Fonctions",q:"Que vaut le résultat de ce code ?\ndef f(x, lst=[]):\n    lst.append(x)\n    return lst\nf(1)\nf(2)",opts:["[1, 2]","[2]","[1] puis [2] séparément","Erreur"],ans:"[1, 2]",exp:"Les arguments mutables par défaut (comme []) sont créés une seule fois à la définition de la fonction. lst est partagée entre tous les appels — piège classique en Python !"},
  {t:"Fonctions",q:"Que retourne ce code ?\nx = 10\ndef f():\n    x += 1\n    return x\nf()",opts:["UnboundLocalError","11","10","None"],ans:"UnboundLocalError",exp:"x += 1 implique une affectation locale. Python considère x comme variable locale dans toute la fonction, mais elle n'est pas définie avant l'affectation → UnboundLocalError."},
  {t:"Fonctions",q:"*args dans def f(*args) capture :",opts:["Un tuple de tous les args positionnels","Une liste de tous les args","Un dict des args nommés","Le premier argument uniquement"],ans:"Un tuple de tous les args positionnels",exp:"*args capture les arguments positionnels supplémentaires dans un tuple (immuable). **kwargs capture les arguments nommés dans un dict."},
  {t:"Itérateurs",q:"Que se passe-t-il si on appelle next() sur un générateur épuisé ?",opts:["StopIteration","None","Recommence depuis le début","Retourne le dernier élément"],ans:"StopIteration",exp:"Un générateur épuisé lève StopIteration. Les boucles for gèrent cette exception automatiquement, mais un appel manuel à next() l'expose directement."},
  {t:"Itérateurs",q:"sum(x**2 for x in range(1000000)) vs sum([x**2 for x in range(1000000)]) : différence principale ?",opts:["Le générateur utilise O(1) mémoire, la liste O(n)","La liste est plus rapide en tout","Les deux sont identiques","Le générateur est toujours 2× plus rapide"],ans:"Le générateur utilise O(1) mémoire, la liste O(n)",exp:"L'expression génératrice calcule les valeurs à la volée → mémoire constante. La list comprehension alloue toute la liste avant de sommer. Pour de grands volumes, le générateur est crucial."},
  {t:"Types",q:"Que retourne type(True) == type(1) ?",opts:["False","True","Erreur","None"],ans:"False",exp:"type(True) → <class 'bool'>, type(1) → <class 'int'>. Ce sont des types distincts. Cela dit, isinstance(True, int) retourne True car bool est une sous-classe de int."},
  {t:"Types",q:"Quelle affirmation est vraie sur les tuples vs listes ?",opts:["Les tuples sont hashables si leurs éléments le sont","Les tuples sont plus lents à itérer","Les tuples supportent append()","Les listes sont hashables"],ans:"Les tuples sont hashables si leurs éléments le sont",exp:"Les tuples immuables peuvent servir de clés de dict ou d'éléments de set si leurs éléments sont hashables. Les listes (mutables) ne sont jamais hashables."},
  {t:"NumPy",q:"a = np.array([1,2,3])\nb = a\nb[0] = 99\nQue vaut a[0] ?",opts:["99","1","Erreur","0"],ans:"99",exp:"b = a crée une vue (alias), pas une copie. Modifier b modifie a. Utilisez b = a.copy() pour une copie indépendante. Même piège qu'avec les listes Python."},
  {t:"Pandas",q:"df['col'].apply(lambda x: x*2) vs df['col']*2 : quelle différence principale ?",opts:["*2 est vectorisé (bien plus rapide)","apply est plus rapide","Performance identique","*2 ne fonctionne que sur les entiers"],ans:"*2 est vectorisé (bien plus rapide)",exp:"Les opérations vectorisées pandas/numpy opèrent en C sur tout le tableau d'un coup. apply() appelle une fonction Python élément par élément → 10-100× plus lent sur de grands datasets."},
  {t:"Pandas",q:"Pourquoi df[df['val'] > 0]['col'] = 99 est-il problématique ?",opts:["SettingWithCopyWarning : la modification peut ne pas affecter df","Ça fonctionne parfaitement","KeyError si 'col' n'existe pas","Ça modifie une copie de df définitivement"],ans:"SettingWithCopyWarning : la modification peut ne pas affecter df",exp:"Le chaînage d'indexation peut créer une copie intermédiaire. La modification s'applique sur la copie et non sur df. Solution correcte : df.loc[df['val']>0, 'col'] = 99."}
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

const questions = raw.map(q=>{
  const s=shuffle(q.opts);
  return{...q,opts:s,ans:s.indexOf(q.ans)};
});

let cur=0, answers=new Array(questions.length).fill(null), okC=0, koC=0;

function upStats(){
  const done=answers.filter(a=>a!==null).length;
  document.getElementById('sa').textContent=done;
  document.getElementById('sc2').textContent=okC;
  document.getElementById('sw').textContent=koC;
  document.getElementById('ss').textContent=done>0?Math.round(okC/done*100)+'%':'—';
  document.getElementById('pb').style.width=Math.round(cur/questions.length*100)+'%';
  document.getElementById('prog').textContent=`Question ${cur+1} / ${questions.length}`;
}

function renderQ(idx){
  if(idx>=questions.length){showResult();return;}
  cur=idx; upStats();
  const q=questions[idx];
  const done=answers[idx]!==null;
  const ua=answers[idx];
  const optH=q.opts.map((o,i)=>{
    let cls='obtn';
    if(done){if(i===q.ans)cls+=' rev-ok';if(i===ua&&ua!==q.ans)cls+=' s-ko';}
    return`<button class="${cls}"${done?' disabled':''}onclick="pick(${idx},${i})">${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');
  let fb='';
  if(done){const ok=ua===q.ans;fb=`<div class="fb ${ok?'ok':'ko'}">${ok?'✓ Correct !':'✗ Incorrect.'} ${q.exp}</div>`;}
  const isCode=q.q.includes('\n');
  document.getElementById('qa').innerHTML=`
    <div class="qcard">
      <div class="qmeta"><span class="qnum">Q${idx+1}</span><span class="qbadge">${q.t}</span></div>
      <div class="qtext${isCode?'':' plain'}">${q.q}</div>
      <div class="opts">${optH}</div>${fb}
    </div>
    <div class="nav">
      <button class="nbtn"onclick="go(${idx-1})"${idx===0?' disabled':''}>← Préc.</button>
      <button class="nbtn pri"onclick="go(${idx+1})">${idx===questions.length-1?'Résultats →':'Suiv. →'}</button>
      <input class="jinp"type="number"min="1"max="${questions.length}"id="ji"placeholder="N°">
      <button class="nbtn"onclick="const v=parseInt(document.getElementById('ji').value)-1;if(v>=0&&v<${questions.length})go(v)">Aller</button>
    </div>`;
}

function pick(qi,oi){
  if(answers[qi]!==null)return;
  answers[qi]=oi;
  if(oi===questions[qi].ans)okC++;else koC++;
  renderQ(qi);
}

function go(idx){
  if(idx<0)return;
  if(idx>=questions.length){showResult();return;}
  renderQ(idx);
}

function showResult(){
  document.getElementById('pb').style.width='100%';
  document.getElementById('prog').textContent='Quiz terminé !';
  upStats();
  document.getElementById('qa').innerHTML='';
  const done=answers.filter(a=>a!==null).length;
  const pct=done>0?Math.round(okC/done*100):0;
  const msg=pct>=80?'Excellent niveau Python !':pct>=60?'Bonne maîtrise, continuez !':'Quelques subtilités à retravailler !';
  const cats={};
  questions.forEach((q,i)=>{
    if(!cats[q.t])cats[q.t]={ok:0,tot:0};
    cats[q.t].tot++;
    if(answers[i]===q.ans)cats[q.t].ok++;
  });
  const tags=Object.entries(cats).map(([t,s])=>`<span class="tag">${t} : ${s.ok}/${s.tot}</span>`).join('');
  document.getElementById('ra').innerHTML=`
    <div class="res">
      <h2>${pct>=80?'🎉':pct>=60?'👍':'📚'} ${msg}</h2>
      <div class="sbig">${pct}%</div>
      <p style="color:#888;font-size:14px">${okC} correctes · ${koC} erreurs · ${done} / ${questions.length} répondues</p>
      <div class="tagrow">${tags}</div>
      <div style="margin-top:1.3rem;display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
        <button class="nbtn pri"onclick="restart()">Recommencer</button>
        <button class="nbtn"onclick="reviewWrong()">Revoir les erreurs</button>
      </div>
    </div>`;
}

function restart(){
  answers=new Array(questions.length).fill(null);okC=0;koC=0;
  document.getElementById('ra').innerHTML='';renderQ(0);
}

function reviewWrong(){
  const bad=answers.map((a,i)=>a!==null&&a!==questions[i].ans?i:-1).filter(i=>i>=0);
  if(!bad.length){alert('Aucune erreur à revoir !');return;}
  document.getElementById('ra').innerHTML='';renderQ(bad[0]);
}

renderQ(0);
</script>
</body>
</html>
